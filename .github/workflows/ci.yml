name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    name: Verify (smoke + bench)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          # Floor major: node:sqlite is flag-free from 22.13 (backport of 23.4).
          # "22" resolves to the latest 22.x, proving the oldest supported major.
          node-version: "22"
      - name: Run core verify
        working-directory: packages/core
        run: npm run verify

  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # Pinned gitleaks BINARY (MIT), not gitleaks-action — the action demands a
      # paid GITLEAKS_LICENSE for organization-owned repos (v2 and v3 alike).
      - name: Install gitleaks (pinned + checksum-verified)
        run: |
          curl -sSfL -o /tmp/gitleaks.tar.gz \
            https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz
          echo "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb  /tmp/gitleaks.tar.gz" | sha256sum -c -
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
      - name: Run gitleaks
        run: /tmp/gitleaks detect --source . --no-banner --redact -v

  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
